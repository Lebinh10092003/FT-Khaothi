<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FermatTech Khảo thí</title>
    <meta name="description" content="Nền tảng khảo thí và cuộc thi quốc tế dành cho học sinh Việt Nam" />
    <link rel="icon" type="image/svg+xml" href="/FT-Khaothi/favicon.svg" />
    <link rel="shortcut icon" href="/FT-Khaothi/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      ;(() => {
        const base = '/FT-Khaothi'
        const examDetails = {
          'iaio-2024': {
            code: 'IAIO',
            title: 'IAIO 2024 - Olympic Trí tuệ nhân tạo Quốc tế',
            subtitle: 'Kỳ thi quốc tế về Trí tuệ nhân tạo dành cho học sinh, giúp đánh giá tư duy công nghệ, dữ liệu, thuật toán và khả năng ứng dụng AI vào bài toán thực tiễn.',
            gradient: 'from-indigo-950 via-blue-800 to-blue-600',
            date: '10/05/2024',
            mode: 'Online',
            time: '90 phút',
            fee: '240.000đ',
            grades: 'Lớp 8 - 12',
            subjects: ['AI căn bản', 'Tư duy dữ liệu', 'Thuật toán', 'Đạo đức AI', 'Ứng dụng thực tế'],
            schedule: [
              ['01/04 - 30/04', 'Mở cổng đăng ký', 'Thí sinh, phụ huynh hoặc nhà trường hoàn tất thông tin đăng ký.'],
              ['05/05', 'Gửi tài khoản dự thi', 'BTC gửi thông tin tài khoản, hướng dẫn đăng nhập và quy định thi.'],
              ['08/05', 'Thi thử / kiểm tra thiết bị', 'Thí sinh kiểm tra máy tính, webcam, micro và làm quen giao diện.'],
              ['10/05', 'Vòng quốc gia', 'Thi chính thức theo khung giờ BTC công bố.'],
              ['Sau 2 - 3 tuần', 'Công bố kết quả', 'Công bố điểm, xếp hạng, chứng nhận và danh sách đủ điều kiện vòng tiếp theo.']
            ],
            structure: [
              ['Phần 1', 'Kiến thức AI nền tảng', 'Nhận biết khái niệm, mô hình, dữ liệu, học máy và ứng dụng AI.'],
              ['Phần 2', 'Tư duy logic & dữ liệu', 'Đọc bảng dữ liệu, suy luận, nhận diện quy luật và đánh giá kết quả.'],
              ['Phần 3', 'Bài toán ứng dụng', 'Giải quyết tình huống thực tế bằng tư duy thuật toán và AI.']
            ],
            outcomes: ['Chứng nhận tham gia cho thí sinh hoàn thành bài thi', 'Giải thưởng theo nhóm thành tích nếu đạt điều kiện', 'Cơ hội tham gia vòng quốc tế theo quy định của BTC', 'Báo cáo kết quả giúp định hướng ôn luyện AI và lập trình']
          },
          'ico-2024': {
            code: 'ICO',
            title: 'ICO 2024 - Olympic Lập trình Quốc tế',
            subtitle: 'Kỳ thi đánh giá tư duy lập trình, thuật toán và năng lực giải quyết vấn đề cho học sinh yêu thích công nghệ.',
            gradient: 'from-sky-950 via-blue-800 to-cyan-600',
            date: '08/06/2024',
            mode: 'Online',
            time: '90 phút',
            fee: '240.000đ',
            grades: 'Lớp 3 - 12',
            subjects: ['Tư duy thuật toán', 'Blockly/Python', 'Cấu trúc điều khiển', 'Xử lý dữ liệu', 'Debug'],
            schedule: [
              ['01/05 - 31/05', 'Mở cổng đăng ký', 'Hoàn tất đăng ký theo cá nhân hoặc theo trường.'],
              ['03/06', 'Gửi tài khoản', 'BTC gửi tài khoản và hướng dẫn dự thi.'],
              ['05/06', 'Thi thử', 'Thí sinh kiểm tra thiết bị và làm quen hệ thống.'],
              ['08/06', 'Vòng quốc gia', 'Thi chính thức theo khung giờ được thông báo.'],
              ['Sau 2 - 3 tuần', 'Công bố kết quả', 'Công bố điểm, giải thưởng và điều kiện vòng sau.']
            ],
            structure: [
              ['Phần 1', 'Tư duy lập trình', 'Biến, điều kiện, vòng lặp, hàm và luồng xử lý.'],
              ['Phần 2', 'Thuật toán', 'Sắp xếp, tìm kiếm, mô phỏng và tối ưu đơn giản.'],
              ['Phần 3', 'Bài toán thực hành', 'Giải quyết tình huống qua mã giả, Blockly hoặc Python.']
            ],
            outcomes: ['Chứng nhận tham gia', 'Giải thưởng theo thành tích', 'Định hướng năng lực lập trình', 'Cơ hội tham dự vòng quốc tế']
          },
          'robotics-stem-2024': {
            code: 'Robotics & STEM',
            title: 'Robotics & STEM Challenge 2024',
            subtitle: 'Sân chơi công nghệ giúp học sinh phát triển năng lực thiết kế, lập trình robot, tư duy kỹ thuật và giải quyết vấn đề thực tế.',
            gradient: 'from-emerald-950 via-green-800 to-teal-600',
            date: '05/07/2024',
            mode: 'Trực tiếp',
            time: 'Theo bảng thi',
            fee: '300.000đ',
            grades: 'Lớp 1 - 12',
            subjects: ['Robot', 'Cảm biến', 'Lập trình', 'Thiết kế kỹ thuật', 'Thuyết trình'],
            schedule: [
              ['01/06 - 25/06', 'Đăng ký đội thi', 'Đăng ký cá nhân hoặc theo đội/trường.'],
              ['28/06', 'Công bố bảng thi', 'BTC công bố bảng thi, nội dung và quy định.'],
              ['01/07', 'Tập huấn kỹ thuật', 'Hướng dẫn thiết bị, luật thi và tiêu chí chấm điểm.'],
              ['05/07', 'Thi chính thức', 'Thi đấu robot/STEM theo bảng.'],
              ['Sau cuộc thi', 'Trao giải', 'Công bố kết quả và chứng nhận.']
            ],
            structure: [
              ['Phần 1', 'Thiết kế & lắp ráp', 'Đánh giá tính ổn định, sáng tạo và khả năng hoàn thiện mô hình.'],
              ['Phần 2', 'Lập trình robot', 'Điều khiển robot thực hiện nhiệm vụ theo luật thi.'],
              ['Phần 3', 'Giải pháp STEM', 'Thuyết trình ý tưởng, hiệu quả và khả năng ứng dụng.']
            ],
            outcomes: ['Chứng nhận tham gia', 'Giải thưởng đội/cá nhân', 'Hồ sơ năng lực STEM', 'Cơ hội tham gia sân chơi cao hơn']
          }
        }

        const applyRegisterLabels = () => {
          const path = window.location.pathname
          const isTargetPage = path === base + '/' || path === base || path === '/' || path.endsWith('/ky-thi')
          if (!isTargetPage) return
          document.querySelectorAll('a, button, span').forEach((el) => {
            const text = (el.textContent || '').trim()
            if (text === 'Xem chi tiết' || text === 'Xem chi tiết →') {
              el.textContent = text.endsWith('→') ? 'Đăng ký ngay →' : 'Đăng ký ngay'
            }
            if (el.tagName === 'A') {
              const href = el.getAttribute('href') || ''
              if (href.includes('/ky-thi/') && (el.textContent || '').includes('Đăng ký ngay')) {
                el.setAttribute('href', base + '/dang-ky')
              }
            }
          })
        }

        const detailHtml = (exam) => `
          <section class="relative overflow-hidden bg-gradient-to-br ${exam.gradient} text-white">
            <div class="absolute inset-0 bg-grid opacity-20"></div>
            <div class="relative mx-auto grid max-w-7xl gap-10 px-4 py-16 lg:grid-cols-[1fr_380px] lg:px-8">
              <div>
                <div class="inline-flex rounded-full bg-white/15 px-4 py-2 text-sm font-bold ring-1 ring-white/20">${exam.code}</div>
                <h1 class="mt-6 text-4xl font-extrabold leading-tight md:text-6xl">${exam.title}</h1>
                <p class="mt-5 max-w-3xl text-lg leading-8 text-blue-50">${exam.subtitle}</p>
                <div class="mt-8 flex flex-wrap gap-4">
                  <a href="${base}/dang-ky" class="inline-flex items-center justify-center gap-2 rounded-xl bg-white px-6 py-4 text-sm font-extrabold text-blue-700 shadow-card">Đăng ký ngay</a>
                  <a href="${base}/tai-lieu" class="inline-flex items-center justify-center gap-2 rounded-xl border border-white/30 bg-white/10 px-6 py-4 text-sm font-extrabold text-white">Tài liệu ôn luyện</a>
                </div>
              </div>
              <div class="rounded-[28px] bg-white/95 p-6 text-slate-950 shadow-soft">
                <h2 class="text-2xl font-extrabold">Thông tin nhanh</h2>
                <div class="mt-5 grid gap-4 text-sm">
                  <div class="flex justify-between rounded-2xl bg-blue-50 p-4"><span>Ngày thi</span><b>${exam.date}</b></div>
                  <div class="flex justify-between rounded-2xl bg-blue-50 p-4"><span>Hình thức</span><b>${exam.mode}</b></div>
                  <div class="flex justify-between rounded-2xl bg-blue-50 p-4"><span>Thời lượng</span><b>${exam.time}</b></div>
                  <div class="flex justify-between rounded-2xl bg-blue-50 p-4"><span>Lệ phí</span><b>${exam.fee}</b></div>
                  <div class="flex justify-between rounded-2xl bg-blue-50 p-4"><span>Đối tượng</span><b>${exam.grades}</b></div>
                </div>
                <a href="${base}/dang-ky" class="mt-6 flex w-full items-center justify-center rounded-2xl bg-blue-600 px-5 py-4 text-sm font-extrabold text-white">Đăng ký tham gia</a>
              </div>
            </div>
          </section>
          <section class="mx-auto max-w-7xl px-4 py-12 lg:px-8">
            <div class="grid gap-8 lg:grid-cols-[1fr_360px]">
              <main class="space-y-8">
                <div class="grid gap-4 md:grid-cols-3">
                  <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-card"><div class="text-3xl font-extrabold text-blue-600">01</div><h3 class="mt-3 text-lg font-extrabold">Đăng ký</h3><p class="mt-2 text-sm leading-6 text-slate-600">Hoàn tất thông tin thí sinh, trường học, lớp và môn thi.</p></div>
                  <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-card"><div class="text-3xl font-extrabold text-blue-600">02</div><h3 class="mt-3 text-lg font-extrabold">Ôn luyện</h3><p class="mt-2 text-sm leading-6 text-slate-600">Sử dụng học liệu, đề mẫu và hướng dẫn thiết bị trước ngày thi.</p></div>
                  <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-card"><div class="text-3xl font-extrabold text-blue-600">03</div><h3 class="mt-3 text-lg font-extrabold">Dự thi</h3><p class="mt-2 text-sm leading-6 text-slate-600">Tham gia vòng thi chính thức và tra cứu kết quả sau khi BTC công bố.</p></div>
                </div>
                <div class="rounded-3xl border border-slate-200 bg-white p-7 shadow-card">
                  <h2 class="text-2xl font-extrabold text-slate-950">Tổng quan kỳ thi</h2>
                  <p class="mt-4 leading-8 text-slate-600">${exam.title} là kỳ thi được xây dựng nhằm đánh giá năng lực học thuật, tư duy công nghệ và khả năng ứng dụng kiến thức của học sinh. Trang này cung cấp đầy đủ thông tin để phụ huynh, học sinh và nhà trường nắm rõ đối tượng, lịch trình, cấu trúc bài thi, quyền lợi và quy trình đăng ký.</p>
                  <div class="mt-5 flex flex-wrap gap-2">${exam.subjects.map(s => `<span class="rounded-full bg-blue-50 px-3 py-1 text-xs font-bold text-blue-700">${s}</span>`).join('')}</div>
                </div>
                <div class="rounded-3xl border border-slate-200 bg-white p-7 shadow-card">
                  <h2 class="text-2xl font-extrabold text-slate-950">Cấu trúc bài thi</h2>
                  <div class="mt-6 grid gap-4">${exam.structure.map(row => `<div class="rounded-2xl bg-slate-50 p-5"><div class="text-sm font-extrabold text-blue-600">${row[0]}</div><h3 class="mt-1 text-lg font-extrabold text-slate-950">${row[1]}</h3><p class="mt-2 text-sm leading-6 text-slate-600">${row[2]}</p></div>`).join('')}</div>
                </div>
                <div class="rounded-3xl border border-slate-200 bg-white p-7 shadow-card">
                  <h2 class="text-2xl font-extrabold text-slate-950">Lịch trình dự kiến</h2>
                  <div class="mt-6 space-y-4">${exam.schedule.map(row => `<div class="grid gap-3 rounded-2xl border border-slate-100 p-5 md:grid-cols-[150px_1fr]"><div class="font-extrabold text-blue-600">${row[0]}</div><div><h3 class="font-extrabold text-slate-950">${row[1]}</h3><p class="mt-1 text-sm leading-6 text-slate-600">${row[2]}</p></div></div>`).join('')}</div>
                </div>
                <div class="rounded-3xl border border-slate-200 bg-white p-7 shadow-card">
                  <h2 class="text-2xl font-extrabold text-slate-950">Quyền lợi thí sinh</h2>
                  <div class="mt-5 grid gap-3 md:grid-cols-2">${exam.outcomes.map(item => `<div class="rounded-2xl bg-emerald-50 px-5 py-4 text-sm font-semibold text-emerald-800">✓ ${item}</div>`).join('')}</div>
                </div>
              </main>
              <aside class="space-y-6">
                <div class="sticky top-24 rounded-3xl border border-slate-200 bg-white p-6 shadow-card">
                  <h3 class="text-xl font-extrabold text-slate-950">Đăng ký kỳ thi</h3>
                  <p class="mt-3 text-sm leading-6 text-slate-600">Hoàn tất đăng ký để nhận tài khoản, hướng dẫn thi thử và thông báo chính thức từ BTC.</p>
                  <a href="${base}/dang-ky" class="mt-5 flex w-full items-center justify-center rounded-2xl bg-blue-600 px-5 py-4 text-sm font-extrabold text-white">Đăng ký ngay</a>
                  <a href="${base}/lien-he" class="mt-3 flex w-full items-center justify-center rounded-2xl border border-blue-200 bg-white px-5 py-4 text-sm font-extrabold text-blue-700">Cần tư vấn</a>
                  <div class="mt-6 border-t border-slate-100 pt-5 text-sm leading-7 text-slate-600">
                    <p><b>Hỗ trợ:</b> support@fermattech.edu.vn</p>
                    <p><b>Hotline:</b> 1900 433 330</p>
                    <p><b>Tra cứu:</b> sau khi BTC công bố kết quả</p>
                  </div>
                </div>
              </aside>
            </div>
          </section>`

        const renderExamDetail = () => {
          const slug = window.location.pathname.split('/ky-thi/')[1]
          if (!slug || !examDetails[slug]) return
          const main = document.querySelector('main')
          if (!main || main.dataset.examDetailHydrated === slug) return
          main.dataset.examDetailHydrated = slug
          main.innerHTML = detailHtml(examDetails[slug])
        }

        const runEnhancements = () => {
          applyRegisterLabels()
          renderExamDetail()
        }
        window.addEventListener('load', runEnhancements)
        setTimeout(runEnhancements, 300)
        setTimeout(runEnhancements, 1000)
        setTimeout(runEnhancements, 1800)
        new MutationObserver(runEnhancements).observe(document.documentElement, { childList: true, subtree: true })
      })()
    </script>
  </body>
</html>
